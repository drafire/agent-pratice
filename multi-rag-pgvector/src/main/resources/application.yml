spring:
  application:
    name: rag-pgvector-example
  autoconfigure:
    exclude:
      - org.springframework.ai.vectorstore.elasticsearch.autoconfigure.ElasticsearchVectorStoreAutoConfiguration

  datasource:
    #注意，如果使用阿里云的pgvector，这个url应该对应的公网地址
    url: jdbc:postgresql://drafire.pg.polardb.rds.aliyuncs.com:5432/drafire_ai_db
    username: drafire_test
    password: ${pg_password}

  ai:
    dashscope:
      api-key: ${DASH_SCOPE_API_KEY}
      # 添加嵌入模型配置
      embedding:
        model: text-embedding-v3  # 使用通义千文的嵌入模型
        dimensions: 1024          # 与 pgvector 配置的维度一致
#      # 确保配置了正确的 rerank 模型名称
      rerank:
        options:
          model: qwen3-rerank
    vectorstore:
      pgvector:
        dimensions: 1024   #这里需要和创建的vector的维度一样
        index-type: hnsw
        distance-type: cosine_distance
        initialize-schema: true  # 开启自动建表

logging:
  level:
    com.alibaba.cloud.ai.dashscope: DEBUG
    org.springframework.web.client: DEBUG

# ====== SpringDoc OpenAPI (Swagger) ======
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha

# ====== 自定义：多知识库配置 ======
knowledge-base:
  stores:
    - scope: product
      table-name: product_embeddings
      dimensions: 1024
      index-type: hnsw
      top-k: 5
      similarity-threshold: 0.7
    - scope: tech
      table-name: tech_embeddings
      dimensions: 1024
      index-type: hnsw
      top-k: 5
      similarity-threshold: 0.6
    - scope: faq
      table-name: faq_embeddings
      dimensions: 1024
      index-type: ivfflat      # FAQ 数据量大，用 IVF 更快
      top-k: 3
      similarity-threshold: 0.8