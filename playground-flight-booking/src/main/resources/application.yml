# spring.ai.chat.client.enabled=false
server:
  port: 9000

spring:
  threads:
    virtual:
      enabled: true
  thymeleaf:
    cache: false

  ###################
  # dashscope
  ###################
  ai:
    dashscope:
      api-key: ${DASH_SCOPE_API_KEY}
      # 添加嵌入模型配置
      embedding:
        model: text-embedding-v3  # 使用通义千文的嵌入模型
        dimensions: 1024          # 与 pgvector 配置的维度一致
      #      # 确保配置了正确的 rerank 模型名称
      rerank:
        options:
          model: qwen3-rerank
    vectorstore:
      pgvector:
        dimensions: 1024   #这里需要和创建的vector的维度一样
        index-type: hnsw
        distance-type: cosine_distance
        initialize-schema: true  # 开启自动建表
  datasource:
    # MySQL 主数据源，用于 chat memory
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/chat_memory?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: 123456
    hikari:
      connection-timeout: 10000
      maximum-pool-size: 5
  sql:
    init:
      mode: always
      schema-locations: classpath:sql/schema.sql
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

###################
# PGVector（独立 PostgreSQL 数据源）
###################
pgvector:
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://drafire.pg.polardb.rds.aliyuncs.com:5432/drafire_ai_db
    username: drafire_test
    password: ${pg_password}
    hikari:
      connection-timeout: 10000
      maximum-pool-size: 5

###################
# MyBatis
###################
mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.drafire.data
  configuration:
    map-underscore-to-camel-case: true