# spring.ai.chat.client.enabled=false
server:
  port: 9000

jwt:
  secret: ${JWT_SECRET:my-secret-key-for-jwt-at-least-256-bits-long!!}
  expiration: 86400000

###################
# Redis 配置
###################
spring:
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 10000ms
      lettuce:
        pool:
          max-active: 4
          max-idle: 2
          min-idle: 1
          max-wait: 1000ms
  threads:
    virtual:
      enabled: true
  thymeleaf:
    cache: false
  ai:
    dashscope:
      api-key: ${DASH_SCOPE_API_KEY}
      chat:
        options:
          model: qwen3-max-preview
          temperature: 0.3
      embedding:
        model: text-embedding-v3
        dimensions: 768
      rerank:
        options:
          model: qwen3-rerank
    alibaba:
      toolcalling:
        hefeng:
          enabled: true
          api-key: ${HE_FENG_API_KEY}
          base-url: ${HE_FENG_BASE_URL}
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/chat_memory?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: 123456
    hikari:
      connection-timeout: 10000
      maximum-pool-size: 5
  sql:
    init:
      mode: always
      schema-locations: classpath:sql/schema.sql
  security:
    user:
      password: not-used

###################
# Zipkin 分布式追踪
###################
management:
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: http://localhost:9411/api/v2/spans
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  metrics:
    export:
      prometheus:
        enabled: true

###################
# 功能开关（Feature Flags）
###################
app:
  feature:
    graph-mode: true
    weather-enabled: true
    input-guard-enabled: true
    output-guard-enabled: true

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

###################
# MyBatis
###################
mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.drafire.data
  configuration:
    map-underscore-to-camel-case: true

logging:
  level:
    com.alibaba.cloud.ai.dashscope: DEBUG
    org.springframework.web.client: DEBUG

###################
# Resilience4j 弹性与容错
###################
resilience4j:
  circuitbreaker:
    instances:
      llm-call:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
  ratelimiter:
    instances:
      chat-api:
        limit-for-period: 20
        limit-refresh-period: 1s
        timeout-duration: 500ms
  retry:
    instances:
      llm-retry:
        max-attempts: 3
        wait-duration: 1s
        exponential-backoff-multiplier: 2
        retry-exceptions:
          - java.net.SocketTimeoutException
          - org.springframework.web.client.ResourceAccessException
  timelimiter:
    instances:
      llm-timeout:
        timeout-duration: 30s
        cancel-running-future: true
  bulkhead:
    instances:
      chat-api:
        max-concurrent-calls: 10
        max-wait-duration: 500ms