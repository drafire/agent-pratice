# spring.ai.chat.client.enabled=false
server:
  port: 9000

jwt:
  secret: ${JWT_SECRET:my-secret-key-for-jwt-at-least-256-bits-long!!}
  expiration: 86400000

###################
# Zipkin 分布式追踪
###################
management:
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: http://localhost:9411/api/v2/spans

###################
# 功能开关（Feature Flags）
# 可动态控制功能启用/禁用，无需重新部署
###################
app:
  feature:
    graph-mode: true          # 是否启用 Graph 模式
    weather-enabled: true     # 是否启用天气查询
    input-guard-enabled: true # 是否启用输入治理（注入检测 + 超长截断）
    output-guard-enabled: true # 是否启用输出治理（ResponseGuard 净化 + 验证）

spring:
  threads:
    virtual:
      enabled: true
  thymeleaf:
    cache: false

  ###################
  # dashscope
  ###################
  ai:
    dashscope:
      api-key: ${DASH_SCOPE_API_KEY}
      chat:
        options:
          model: qwen3-max
          temperature: 0.3
      # 添加嵌入模型配置
      embedding:
        model: text-embedding-v3  # 使用通义千文的嵌入模型
        dimensions: 1024          # 与 pgvector 配置的维度一致
      #      # 确保配置了正确的 rerank 模型名称
      rerank:
        options:
          model: qwen3-rerank
    vectorstore:
      pgvector:
        dimensions: 1024   #这里需要和创建的vector的维度一样
        index-type: hnsw
        distance-type: cosine_distance
        initialize-schema: true  # 开启自动建表
    alibaba:
      toolcalling:
        hefeng:
          enabled: true
          api-key: ${HE_FENG_API_KEY}
          base-url: ${HE_FENG_BASE_URL}
  datasource:
    # MySQL 主数据源，用于 chat memory
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/chat_memory?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: 123456
    hikari:
      connection-timeout: 10000
      maximum-pool-size: 5
  sql:
    init:
      mode: always
      schema-locations: classpath:sql/schema.sql
  security:
    user:
      password: not-used
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

###################
# PGVector（独立 PostgreSQL 数据源）
###################
pgvector:
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://drafire.pg.polardb.rds.aliyuncs.com:5432/drafire_ai_db
    username: drafire_test
    password: ${pg_password}
    hikari:
      connection-timeout: 10000
      maximum-pool-size: 5

###################
# MyBatis
###################
mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.drafire.data
  configuration:
    map-underscore-to-camel-case: true

logging:
  level:
    com.alibaba.cloud.ai.dashscope: DEBUG
    org.springframework.web.client: DEBUG