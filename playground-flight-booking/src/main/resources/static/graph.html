<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Graph Agent - Flight Booking</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #F4F5F7;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .header {
            background: #fff;
            padding: 12px 24px;
            border-bottom: 1px solid #e8e8e8;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 1px 4px rgba(0,0,0,0.04);
        }
        .header h1 {
            font-size: 18px;
            color: #1a1a1a;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .header .badge {
            background: #f0f5ff;
            color: #4A90D9;
            font-size: 12px;
            padding: 2px 8px;
            border-radius: 4px;
            font-weight: 500;
        }
        .header .user-info {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 14px;
            color: #666;
        }
        .header .logout-btn {
            background: none;
            border: 1px solid #ddd;
            padding: 6px 14px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            color: #666;
            transition: all 0.2s;
        }
        .header .logout-btn:hover {
            border-color: #e74c3c;
            color: #e74c3c;
        }
        .chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            max-width: 900px;
            width: 100%;
            margin: 0 auto;
            background: #fff;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
        }
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .chat-messages::-webkit-scrollbar {
            width: 6px;
        }
        .chat-messages::-webkit-scrollbar-thumb {
            background: #ddd;
            border-radius: 3px;
        }
        .message {
            display: flex;
            gap: 10px;
            max-width: 80%;
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .message.user {
            align-self: flex-end;
            flex-direction: row-reverse;
        }
        .message.assistant {
            align-self: flex-start;
        }
        .message .avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            flex-shrink: 0;
        }
        .message.user .avatar {
            background: #4A90D9;
            color: #fff;
        }
        .message.assistant .avatar {
            background: #f0f5ff;
            color: #4A90D9;
        }
        .message .bubble {
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 14px;
            line-height: 1.7;
            white-space: pre-wrap;
            word-break: break-word;
        }
        .message.user .bubble {
            background: #4A90D9;
            color: #fff;
            border-bottom-right-radius: 4px;
        }
        .message.assistant .bubble {
            background: #f5f5f5;
            color: #333;
            border-bottom-left-radius: 4px;
        }
        .message.assistant .bubble.typing {
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 14px 20px;
        }
        .message.assistant .bubble.typing .dot {
            width: 7px;
            height: 7px;
            background: #999;
            border-radius: 50%;
            animation: typingBounce 1.4s infinite ease-in-out both;
        }
        .message.assistant .bubble.typing .dot:nth-child(1) { animation-delay: 0s; }
        .message.assistant .bubble.typing .dot:nth-child(2) { animation-delay: 0.2s; }
        .message.assistant .bubble.typing .dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes typingBounce {
            0%, 80%, 100% { transform: scale(0.5); opacity: 0.3; }
            40% { transform: scale(1); opacity: 1; }
        }
        .chat-input-area {
            padding: 16px 24px;
            border-top: 1px solid #eee;
            display: flex;
            gap: 12px;
            align-items: flex-end;
        }
        .chat-input-area textarea {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid #ddd;
            border-radius: 10px;
            font-size: 14px;
            line-height: 1.5;
            resize: none;
            outline: none;
            font-family: inherit;
            transition: border-color 0.2s;
            max-height: 120px;
        }
        .chat-input-area textarea:focus {
            border-color: #4A90D9;
        }
        .chat-input-area textarea:disabled {
            background: #f9f9f9;
        }
        .send-btn {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: #4A90D9;
            color: #fff;
            border: none;
            cursor: pointer;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
            flex-shrink: 0;
        }
        .send-btn:hover {
            background: #357ABD;
        }
        .send-btn:disabled {
            background: #a0c4e8;
            cursor: not-allowed;
        }
        .empty-state {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #bbb;
            gap: 8px;
        }
        .empty-state .icon {
            font-size: 48px;
            margin-bottom: 8px;
        }
        .empty-state .hint {
            font-size: 13px;
            color: #ccc;
        }
        .suggestions {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
            margin-top: 16px;
        }
        .suggestion-chip {
            padding: 8px 16px;
            background: #f0f5ff;
            border: 1px solid #d6e4ff;
            border-radius: 20px;
            font-size: 13px;
            color: #4A90D9;
            cursor: pointer;
            transition: all 0.2s;
        }
        .suggestion-chip:hover {
            background: #d6e4ff;
        }
    </style>
</head>
<body>
<div class="header">
    <h1>
        ✈️ Funnair 助手
        <span class="badge">Graph Agent</span>
    </h1>
    <div class="user-info">
        <span id="username-display"></span>
        <button class="logout-btn" onclick="logout()">退出</button>
    </div>
</div>
<div class="chat-container">
    <div class="chat-messages" id="chat-messages">
        <div class="empty-state" id="empty-state">
            <div class="icon">🤖</div>
            <div>你好！我是 Funnair 航空助手</div>
            <div class="hint">可以帮你搜索航班、查询订单、改签、取消等</div>
            <div class="suggestions">
                <span class="suggestion-chip" onclick="sendSuggestion('查询北京到上海的航班')">🔍 搜索航班</span>
                <span class="suggestion-chip" onclick="sendSuggestion('查询订单 BKG-001')">📋 查询订单</span>
                <span class="suggestion-chip" onclick="sendSuggestion('今天北京天气怎么样')">🌤️ 查询天气</span>
                <span class="suggestion-chip" onclick="sendSuggestion('取消订单 BKG-001')">❌ 取消订单</span>
            </div>
        </div>
    </div>
    <div class="chat-input-area">
        <textarea id="user-input" rows="1" placeholder="输入消息..."
                  onkeydown="handleKeyDown(event)"></textarea>
        <button class="send-btn" id="send-btn" onclick="sendMessage()" disabled>➤</button>
    </div>
</div>

<script src="/auth-bridge.js"></script>
<script>
(function() {
    var username = window.__AUTH__ ? window.__AUTH__.username : 'User';
    document.getElementById('username-display').textContent = username;

    var chatMessages = document.getElementById('chat-messages');
    var userInput = document.getElementById('user-input');
    var sendBtn = document.getElementById('send-btn');
    var emptyState = document.getElementById('empty-state');
    var isStreaming = false;
    var currentAssistantBubble = null;

    userInput.addEventListener('input', function() {
        sendBtn.disabled = !userInput.value.trim() || isStreaming;
        this.style.height = 'auto';
        this.style.height = Math.min(this.scrollHeight, 120) + 'px';
    });

    function scrollToBottom() {
        chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    function addUserMessage(text) {
        if (emptyState) {
            emptyState.remove();
            emptyState = null;
        }
        var div = document.createElement('div');
        div.className = 'message user';
        div.innerHTML = '<div class="avatar">👤</div><div class="bubble"></div>';
        div.querySelector('.bubble').textContent = text;
        chatMessages.appendChild(div);
        scrollToBottom();
    }

    function addTypingBubble() {
        if (emptyState) {
            emptyState.remove();
            emptyState = null;
        }
        var div = document.createElement('div');
        div.className = 'message assistant';
        div.id = 'typing-bubble';
        div.innerHTML = '<div class="avatar">🤖</div><div class="bubble typing"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>';
        chatMessages.appendChild(div);
        scrollToBottom();
        return div;
    }

    function removeTypingBubble() {
        var el = document.getElementById('typing-bubble');
        if (el) el.remove();
    }

    function addAssistantBubble() {
        var div = document.createElement('div');
        div.className = 'message assistant';
        div.innerHTML = '<div class="avatar">🤖</div><div class="bubble"></div>';
        chatMessages.appendChild(div);
        currentAssistantBubble = div.querySelector('.bubble');
        scrollToBottom();
    }

    function appendToAssistantBubble(text) {
        if (currentAssistantBubble) {
            currentAssistantBubble.textContent += text;
            scrollToBottom();
        }
    }

    function finishAssistantBubble() {
        currentAssistantBubble = null;
    }

    function setStreaming(streaming) {
        isStreaming = streaming;
        userInput.disabled = streaming;
        sendBtn.disabled = streaming || !userInput.value.trim();
        if (streaming) {
            sendBtn.textContent = '⏳';
        } else {
            sendBtn.textContent = '➤';
        }
    }

    window.sendMessage = function() {
        var text = userInput.value.trim();
        if (!text || isStreaming) return;
        send(text);
    };

    window.sendSuggestion = function(text) {
        if (isStreaming) return;
        send(text);
    };

    function send(text) {
        addUserMessage(text);
        userInput.value = '';
        userInput.style.height = 'auto';
        setStreaming(true);

        addTypingBubble();

        var url = '/api/graph/chat?userMessage=' + encodeURIComponent(text);

        var eventSource = new EventSource(url);

        var firstChunk = true;

        eventSource.onmessage = function(event) {
            if (firstChunk) {
                removeTypingBubble();
                addAssistantBubble();
                firstChunk = false;
            }
            if (event.data) {
                appendToAssistantBubble(event.data);
            }
        };

        eventSource.onerror = function() {
            removeTypingBubble();
            if (firstChunk) {
                addAssistantBubble();
                appendToAssistantBubble('抱歉，处理请求时出错了，请稍后重试。');
            }
            finishAssistantBubble();
            eventSource.close();
            setStreaming(false);
        };

        eventSource.addEventListener('done', function() {
            finishAssistantBubble();
            eventSource.close();
            setStreaming(false);
        });

        var closeTimeout = setTimeout(function() {
            if (eventSource.readyState !== EventSource.CLOSED) {
                finishAssistantBubble();
                eventSource.close();
                setStreaming(false);
            }
        }, 120000);

        var originalClose = eventSource.close;
        eventSource.close = function() {
            clearTimeout(closeTimeout);
            originalClose.call(eventSource);
        };
    }

    window.handleKeyDown = function(event) {
        if (event.key === 'Enter' && !event.shiftKey) {
            event.preventDefault();
            sendMessage();
        }
    };

    window.logout = function() {
        localStorage.clear();
        sessionStorage.clear();
        window.location.href = '/login.html';
    };
})();
</script>
</body>
</html>
