<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>操作确认 - Funnair 航空</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 520px;
            width: 100%;
            padding: 40px;
        }
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        .header h1 { font-size: 24px; color: #333; }
        .header .icon { font-size: 48px; margin-bottom: 10px; }
        .detail-row {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid #eee;
            font-size: 15px;
        }
        .detail-row .label { color: #888; }
        .detail-row .value { color: #333; font-weight: 500; }
        .warning {
            background: #fff3cd;
            border: 1px solid #ffc107;
            border-radius: 8px;
            padding: 12px 16px;
            margin: 20px 0;
            color: #856404;
            font-size: 14px;
        }
        .error {
            background: #f8d7da;
            border: 1px solid #f5c6cb;
            border-radius: 8px;
            padding: 12px 16px;
            margin: 20px 0;
            color: #721c24;
            font-size: 14px;
            display: none;
        }
        .success {
            background: #d4edda;
            border: 1px solid #c3e6cb;
            border-radius: 8px;
            padding: 12px 16px;
            margin: 20px 0;
            color: #155724;
            font-size: 14px;
            display: none;
        }
        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 10px;
        }
        .btn-confirm {
            background: #dc3545;
            color: white;
        }
        .btn-confirm:hover { background: #c82333; }
        .btn-confirm:disabled { background: #ccc; cursor: not-allowed; }
        .btn-cancel {
            background: #6c757d;
            color: white;
        }
        .btn-cancel:hover { background: #5a6268; }
        .btn-back {
            background: #667eea;
            color: white;
            margin-top: 20px;
        }
        .btn-back:hover { background: #5a6fd6; }
        .loading {
            text-align: center;
            padding: 40px;
            color: #888;
        }
        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 16px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .expired-info {
            color: #888;
            font-size: 12px;
            text-align: center;
            margin-top: 8px;
        }
    </style>
</head>
<body>
<div class="container">
    <div id="loading" class="loading">
        <div class="spinner"></div>
        <p>正在加载操作详情...</p>
    </div>

    <div id="content" style="display:none;">
        <div class="header">
            <div class="icon" id="actionIcon"></div>
            <h1 id="actionTitle"></h1>
        </div>

        <div id="detailSection"></div>

        <div class="warning" id="warningMsg"></div>
        <div class="error" id="errorMsg"></div>
        <div class="success" id="successMsg"></div>

        <div id="buttonSection">
            <button class="btn btn-confirm" id="confirmBtn" onclick="confirmAction()">确认执行</button>
            <button class="btn btn-cancel" id="cancelBtn" onclick="window.close()">取消</button>
            <div class="expired-info" id="expiredInfo"></div>
        </div>

        <button class="btn btn-back" id="backBtn" style="display:none;" onclick="window.location.href='/graph.html'">返回对话</button>
    </div>
</div>

<script src="/auth-bridge.js"></script>
<script>
    const urlParams = new URLSearchParams(window.location.search);
    const token = urlParams.get('token');

    if (!token) {
        showError('缺少操作令牌，请从对话链接中打开此页面。');
        return;
    }

    async function loadActionDetail() {
        try {
            const headers = await getAuthHeaders();
            const resp = await fetch('/api/actions/' + token, { headers });
            if (!resp.ok) {
                const err = await resp.json();
                showError(err.error || '加载失败');
                return;
            }
            const detail = await resp.json();
            renderAction(detail);
        } catch (e) {
            showError('网络错误: ' + e.message);
        }
    }

    async function getAuthHeaders() {
        const headers = { 'Content-Type': 'application/json' };
        if (window.authBridge) {
            const auth = await window.authBridge.getAuth();
            if (auth && auth.token) {
                headers['Authorization'] = 'Bearer ' + auth.token;
            }
        }
        return headers;
    }

    function renderAction(detail) {
        document.getElementById('loading').style.display = 'none';
        document.getElementById('content').style.display = 'block';

        const isCancel = detail.actionType === 'CANCEL_BOOKING';

        document.getElementById('actionIcon').textContent = isCancel ? '🗑️' : '📋';
        document.getElementById('actionTitle').textContent = isCancel ? '取消订单确认' : '改签确认';
        document.getElementById('warningMsg').textContent = isCancel
            ? '取消后不可恢复，请谨慎操作。'
            : '确认后将执行改签，请核实信息无误。';

        let html = '';
        html += detailRow('订单号', detail.bookingNumber);
        html += detailRow('乘客', detail.customerName);

        if (isCancel && detail.bookingDetail) {
            const bd = detail.bookingDetail;
            html += detailRow('原行程', bd.from + ' → ' + bd.to);
            html += detailRow('原日期', bd.date);
            html += detailRow('舱位', bd.bookingClass);
            html += detailRow('状态', bd.status);
        } else {
            html += detailRow('新出发地', detail.from || '-');
            html += detailRow('新目的地', detail.to || '-');
            html += detailRow('新日期', detail.date || '-');
        }

        document.getElementById('detailSection').innerHTML = html;

        const expiresAt = new Date(detail.expiresAt);
        document.getElementById('expiredInfo').textContent =
            '链接有效期至: ' + expiresAt.toLocaleTimeString();
    }

    function detailRow(label, value) {
        return '<div class="detail-row"><span class="label">' + label + '</span><span class="value">' + value + '</span></div>';
    }

    async function confirmAction() {
        const btn = document.getElementById('confirmBtn');
        btn.disabled = true;
        btn.textContent = '执行中...';
        hideError();
        hideSuccess();

        try {
            const headers = await getAuthHeaders();
            const resp = await fetch('/api/actions/confirm/' + token, { method: 'POST', headers });
            const result = await resp.json();

            if (result.success) {
                showSuccess(result.message);
                document.getElementById('buttonSection').style.display = 'none';
                document.getElementById('backBtn').style.display = 'block';
            } else {
                showError(result.error || '操作失败');
                btn.disabled = false;
                btn.textContent = '确认执行';
            }
        } catch (e) {
            showError('网络错误: ' + e.message);
            btn.disabled = false;
            btn.textContent = '确认执行';
        }
    }

    function showError(msg) {
        document.getElementById('loading').style.display = 'none';
        document.getElementById('content').style.display = 'block';
        const el = document.getElementById('errorMsg');
        el.textContent = msg;
        el.style.display = 'block';
        document.getElementById('buttonSection').style.display = 'none';
        document.getElementById('backBtn').style.display = 'block';
    }

    function hideError() {
        document.getElementById('errorMsg').style.display = 'none';
    }

    function showSuccess(msg) {
        const el = document.getElementById('successMsg');
        el.textContent = msg;
        el.style.display = 'block';
    }

    function hideSuccess() {
        document.getElementById('successMsg').style.display = 'none';
    }

    loadActionDetail();
</script>
</body>
</html>
