<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Flight Booking</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #F4F5F7;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .login-container {
            background: #fff;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
            width: 100%;
            max-width: 400px;
        }
        .login-container h2 {
            text-align: center;
            margin-bottom: 32px;
            color: #1a1a1a;
            font-size: 24px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 6px;
            color: #555;
            font-size: 14px;
            font-weight: 500;
        }
        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 15px;
            transition: border-color 0.2s;
            outline: none;
        }
        .form-group input:focus {
            border-color: #4A90D9;
        }
        .btn {
            width: 100%;
            padding: 12px;
            background: #4A90D9;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn:hover {
            background: #357ABD;
        }
        .btn:disabled {
            background: #a0c4e8;
            cursor: not-allowed;
        }
        .error-msg {
            color: #e74c3c;
            font-size: 13px;
            margin-top: 8px;
            text-align: center;
            display: none;
        }
        .error-msg.show {
            display: block;
        }
        .toggle-link {
            text-align: center;
            margin-top: 16px;
            font-size: 14px;
            color: #888;
        }
        .toggle-link a {
            color: #4A90D9;
            cursor: pointer;
            text-decoration: none;
        }
        .toggle-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
<div class="login-container">
    <h2 id="form-title">Login</h2>
    <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" placeholder="Enter your username" autocomplete="username">
    </div>
    <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Enter your password" autocomplete="current-password">
    </div>
    <button class="btn" id="submit-btn" onclick="handleSubmit()">Login</button>
    <div class="error-msg" id="error-msg"></div>
    <div class="toggle-link">
        <span id="toggle-text">Don't have an account?</span>
        <a id="toggle-btn" onclick="toggleMode()">Register</a>
    </div>
</div>

<script src="/login.js"></script>
</body>
</html>
