<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Metrics Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            padding: 20px;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid #334155;
        }
        .header h1 { font-size: 24px; color: #38bdf8; }
        .refresh-info { display: flex; align-items: center; gap: 15px; }
        .refresh-info span { color: #94a3b8; font-size: 14px; }
        .refresh-btn {
            background: #3b82f6; color: white; border: none;
            padding: 8px 16px; border-radius: 6px; cursor: pointer; font-size: 14px;
        }
        .refresh-btn:hover { background: #2563eb; }
        .toggle-btn {
            background: #10b981; color: white; border: none;
            padding: 8px 16px; border-radius: 6px; cursor: pointer; font-size: 14px;
        }
        .toggle-btn.paused { background: #f59e0b; }
        .cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }
        .card {
            background: #1e293b; border-radius: 10px; padding: 20px; border: 1px solid #334155;
        }
        .card h3 { font-size: 12px; color: #94a3b8; text-transform: uppercase; margin-bottom: 10px; }
        .card .value { font-size: 28px; font-weight: bold; color: #38bdf8; }
        .card .sub { font-size: 12px; color: #64748b; margin-top: 5px; }
        .charts {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(500px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .chart-container {
            background: #1e293b; border-radius: 10px; padding: 20px; border: 1px solid #334155;
        }
        .chart-container h2 { font-size: 16px; margin-bottom: 15px; color: #e2e8f0; }
        .chart-container canvas { max-height: 300px; }
        .metrics-table {
            background: #1e293b; border-radius: 10px; padding: 20px; border: 1px solid #334155; margin-bottom: 30px;
        }
        .metrics-table h2 { font-size: 16px; margin-bottom: 15px; color: #e2e8f0; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 10px; text-align: left; border-bottom: 1px solid #334155; }
        th { color: #94a3b8; font-size: 12px; text-transform: uppercase; }
        td { font-size: 14px; font-family: 'Courier New', monospace; }
        .status-ok { color: #10b981; }
        .status-error { color: #ef4444; }
    </style>
</head>
<body>
    <div class="header">
        <h1>Flight Booking Metrics Dashboard</h1>
        <div class="refresh-info">
            <span id="lastUpdate">Last update: --</span>
            <button class="toggle-btn" id="toggleAutoRefresh" onclick="toggleAutoRefresh()">Auto Refresh: ON</button>
            <button class="refresh-btn" onclick="refreshMetrics()">Refresh</button>
        </div>
    </div>

    <div class="cards" id="summaryCards"></div>

    <div class="charts">
        <div class="chart-container">
            <h2>Token Usage Trend</h2>
            <canvas id="tokenChart"></canvas>
        </div>
        <div class="chart-container">
            <h2>LLM Latency (seconds)</h2>
            <canvas id="latencyChart"></canvas>
        </div>
        <div class="chart-container">
            <h2>Intent Distribution</h2>
            <canvas id="intentChart"></canvas>
        </div>
        <div class="chart-container">
            <h2>Request Volume</h2>
            <canvas id="requestChart"></canvas>
        </div>
    </div>

    <div class="metrics-table">
        <h2>All Metrics Details</h2>
        <table>
            <thead>
                <tr><th>Name</th><th>Type</th><th>Tags</th><th>Value</th></tr>
            </thead>
            <tbody id="metricsTableBody">
                <tr><td colspan="4">Loading...</td></tr>
            </tbody>
        </table>
    </div>

    <script>
        let autoRefresh = true;
        let refreshInterval;
        const REFRESH_INTERVAL_MS = 5000;

        const tokenChart = new Chart(document.getElementById('tokenChart'), {
            type: 'line',
            data: {
                labels: [],
                datasets: [
                    { label: 'Prompt Tokens', data: [], borderColor: '#3b82f6', backgroundColor: 'rgba(59,130,246,0.1)', tension: 0.3, fill: true },
                    { label: 'Completion Tokens', data: [], borderColor: '#10b981', backgroundColor: 'rgba(16,185,129,0.1)', tension: 0.3, fill: true }
                ]
            },
            options: {
                responsive: true,
                plugins: { legend: { labels: { color: '#e2e8f0' } } },
                scales: {
                    x: { ticks: { color: '#94a3b8' }, grid: { color: '#334155' } },
                    y: { ticks: { color: '#94a3b8' }, grid: { color: '#334155' }, beginAtZero: true }
                }
            }
        });

        const latencyChart = new Chart(document.getElementById('latencyChart'), {
            type: 'line',
            data: {
                labels: [],
                datasets: [
                    { label: 'Intent Classification', data: [], borderColor: '#f59e0b', tension: 0.3 },
                    { label: 'Parameter Extraction', data: [], borderColor: '#8b5cf6', tension: 0.3 },
                    { label: 'Response Generation', data: [], borderColor: '#ec4899', tension: 0.3 }
                ]
            },
            options: {
                responsive: true,
                plugins: { legend: { labels: { color: '#e2e8f0' } } },
                scales: {
                    x: { ticks: { color: '#94a3b8' }, grid: { color: '#334155' } },
                    y: { ticks: { color: '#94a3b8' }, grid: { color: '#334155' }, beginAtZero: true }
                }
            }
        });

        const intentChart = new Chart(document.getElementById('intentChart'), {
            type: 'doughnut',
            data: {
                labels: [],
                datasets: [{
                    data: [],
                    backgroundColor: ['#3b82f6', '#10b981', '#f59e0b', '#8b5cf6', '#ec4899', '#ef4444', '#06b6d4']
                }]
            },
            options: {
                responsive: true,
                plugins: { legend: { labels: { color: '#e2e8f0' } } }
            }
        });

        const requestChart = new Chart(document.getElementById('requestChart'), {
            type: 'bar',
            data: {
                labels: [],
                datasets: [
                    { label: 'Accepted', data: [], backgroundColor: '#10b981' },
                    { label: 'Blocked', data: [], backgroundColor: '#ef4444' }
                ]
            },
            options: {
                responsive: true,
                plugins: { legend: { labels: { color: '#e2e8f0' } } },
                scales: {
                    x: { ticks: { color: '#94a3b8' }, grid: { color: '#334155' } },
                    y: { ticks: { color: '#94a3b8' }, grid: { color: '#334155' }, beginAtZero: true, stacked: true }
                }
            }
        });

        function toggleAutoRefresh() {
            autoRefresh = !autoRefresh;
            const btn = document.getElementById('toggleAutoRefresh');
            if (autoRefresh) {
                btn.textContent = 'Auto Refresh: ON';
                btn.classList.remove('paused');
                startAutoRefresh();
            } else {
                btn.textContent = 'Auto Refresh: OFF';
                btn.classList.add('paused');
                stopAutoRefresh();
            }
        }

        function startAutoRefresh() {
            stopAutoRefresh();
            refreshInterval = setInterval(refreshMetrics, REFRESH_INTERVAL_MS);
        }

        function stopAutoRefresh() {
            if (refreshInterval) { clearInterval(refreshInterval); refreshInterval = null; }
        }

        async function refreshMetrics() {
            try {
                const response = await fetch('/api/metrics');
                const data = await response.json();
                updateDashboard(data);
                document.getElementById('lastUpdate').textContent = 'Last update: ' + new Date().toLocaleTimeString();
            } catch (e) {
                console.error('Failed to fetch metrics:', e);
            }
        }

        function updateDashboard(data) {
            updateSummaryCards(data);
            updateTokenChart(data);
            updateLatencyChart(data);
            updateIntentChart(data);
            updateRequestChart(data);
            updateMetricsTable(data);
        }

        function updateSummaryCards(data) {
            const cards = document.getElementById('summaryCards');
            const totalRequests = data.requests?.total || 0;
            const totalTokens = data.tokens?.total || 0;
            const avgLatency = data.latency?.avg || 0;
            const errors = data.errors?.total || 0;

            cards.innerHTML = `
                <div class="card">
                    <h3>Total Requests</h3>
                    <div class="value">${totalRequests}</div>
                    <div class="sub">Accepted: ${data.requests?.accepted || 0} | Blocked: ${data.requests?.blocked || 0}</div>
                </div>
                <div class="card">
                    <h3>Total Token Usage</h3>
                    <div class="value">${formatNumber(totalTokens)}</div>
                    <div class="sub">Prompt: ${formatNumber(data.tokens?.prompt || 0)} | Completion: ${formatNumber(data.tokens?.completion || 0)}</div>
                </div>
                <div class="card">
                    <h3>Avg LLM Latency</h3>
                    <div class="value">${avgLatency.toFixed(2)}s</div>
                    <div class="sub">Total ${data.latency?.count || 0} calls</div>
                </div>
                <div class="card">
                    <h3>Errors</h3>
                    <div class="value ${errors > 0 ? 'status-error' : 'status-ok'}">${errors}</div>
                    <div class="sub">Input Guarded: ${data.inputGuarded || 0}</div>
                </div>
            `;
        }

        function updateTokenChart(data) {
            const now = new Date().toLocaleTimeString();
            tokenChart.data.labels.push(now);
            tokenChart.data.datasets[0].data.push(data.tokens?.promptRate || 0);
            tokenChart.data.datasets[1].data.push(data.tokens?.completionRate || 0);
            if (tokenChart.data.labels.length > 20) {
                tokenChart.data.labels.shift();
                tokenChart.data.datasets[0].data.shift();
                tokenChart.data.datasets[1].data.shift();
            }
            tokenChart.update();
        }

        function updateLatencyChart(data) {
            const now = new Date().toLocaleTimeString();
            latencyChart.data.labels.push(now);
            latencyChart.data.datasets[0].data.push(data.latency?.intent || 0);
            latencyChart.data.datasets[1].data.push(data.latency?.extract || 0);
            latencyChart.data.datasets[2].data.push(data.latency?.generate || 0);
            if (latencyChart.data.labels.length > 20) {
                latencyChart.data.labels.shift();
                latencyChart.data.datasets.forEach(ds => ds.data.shift());
            }
            latencyChart.update();
        }

        function updateIntentChart(data) {
            const intents = data.intents || {};
            intentChart.data.labels = Object.keys(intents);
            intentChart.data.datasets[0].data = Object.values(intents);
            intentChart.update();
        }

        function updateRequestChart(data) {
            const requests = data.requestsByIntent || {};
            const labels = Object.keys(requests);
            requestChart.data.labels = labels;
            requestChart.data.datasets[0].data = labels.map(k => requests[k]?.accepted || 0);
            requestChart.data.datasets[1].data = labels.map(k => requests[k]?.blocked || 0);
            requestChart.update();
        }

        function updateMetricsTable(data) {
            const tbody = document.getElementById('metricsTableBody');
            const rows = [];
            if (data.rawMetrics) {
                data.rawMetrics.forEach(m => {
                    rows.push(`<tr><td>${m.name}</td><td>${m.type}</td><td>${m.tags || '-'}</td><td>${m.value}</td></tr>`);
                });
            }
            tbody.innerHTML = rows.length > 0 ? rows.join('') : '<tr><td colspan="4">No data</td></tr>';
        }

        function formatNumber(num) {
            if (num >= 1000000) return (num / 1000000).toFixed(1) + 'M';
            if (num >= 1000) return (num / 1000).toFixed(1) + 'K';
            return num.toString();
        }

        startAutoRefresh();
        refreshMetrics();
    </script>
</body>
</html>
