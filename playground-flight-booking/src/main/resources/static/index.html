
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>playground-flight-booking Example</title>
  <script src="/auth-bridge.js"></script>
  <script type="module" crossorigin src="/assets/index-ML2E6Jvh.js"></script>
  <link rel="stylesheet" crossorigin href="/assets/index-qWDsEEr7.css">
  <style>
    .typing-indicator {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      padding: 12px 24px;
      background: #fff;
      border-radius: 8px;
      border: 1px solid #e8e8e8;
      white-space: nowrap;
    }
    .typing-indicator .dot-container {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .typing-indicator .dot {
      width: 8px;
      height: 8px;
      background: #1677ff;
      border-radius: 50%;
      animation: typingBounce 1.4s infinite ease-in-out both;
    }
    .typing-indicator .dot:nth-child(1) { animation-delay: 0s; }
    .typing-indicator .dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes typingBounce {
      0%, 80%, 100% { transform: scale(0.5); opacity: 0.3; }
      40% { transform: scale(1); opacity: 1; }
    }
  </style>
</head>
<body style="background: #F4F5F7;">
<div id="app"></div>
<script>
(function() {
  var loadingEl = null;
  var loadingTimeout = null;
  var activeStreams = 0;

  function getChatBody() {
    return document.querySelector('.ant-card-body');
  }

  function createLoadingBubble() {
    var el = document.createElement('div');
    el.className = 'typing-indicator';
    el.innerHTML = '<span class="dot-container"><span class="dot"></span><span class="dot"></span><span class="dot"></span></span>';
    return el;
  }

  function showLoading() {
    var container = getChatBody();
    if (!container) {
      setTimeout(showLoading, 100);
      return;
    }
    removeLoading();
    container.style.position = 'relative';
    loadingEl = createLoadingBubble();
    container.appendChild(loadingEl);
    clearTimeout(loadingTimeout);
    loadingTimeout = setTimeout(hideLoading, 60000);
  }

  function removeLoading() {
    if (loadingEl && loadingEl.parentNode) {
      loadingEl.parentNode.removeChild(loadingEl);
    }
    loadingEl = null;
  }

  function hideLoading() {
    if (activeStreams > 0) return;
    clearTimeout(loadingTimeout);
    removeLoading();
  }

  var OriginalEventSource = window.EventSource;
  window.EventSource = function(url, config) {
    var es = new OriginalEventSource(url, config);
    var isChatApi = url.indexOf('/api/assistant/chat') !== -1;

    if (isChatApi) {
      activeStreams++;
      showLoading();

      var originalAddEventListener = es.addEventListener;
      es.addEventListener = function(type, listener, options) {
        if (type === 'message' || type === 'data') {
          var wrappedListener = function(event) {
            hideLoading();
            listener.call(this, event);
          };
          return originalAddEventListener.call(this, type, wrappedListener, options);
        }
        return originalAddEventListener.call(this, type, listener, options);
      };

      var originalOnmessageDescriptor = Object.getOwnPropertyDescriptor(es, 'onmessage');
      if (originalOnmessageDescriptor && originalOnmessageDescriptor.configurable) {
        var _onmessage = null;
        Object.defineProperty(es, 'onmessage', {
          get: function() { return _onmessage; },
          set: function(fn) {
            _onmessage = function(event) {
              hideLoading();
              if (fn) fn.call(this, event);
            };
          },
          configurable: true
        });
      }

      es.addEventListener('error', function() {
        activeStreams--;
        if (activeStreams <= 0) {
          activeStreams = 0;
          hideLoading();
        }
      });
    }

    return es;
  };
  window.EventSource.prototype = OriginalEventSource.prototype;
  window.EventSource.CONNECTING = OriginalEventSource.CONNECTING;
  window.EventSource.OPEN = OriginalEventSource.OPEN;
  window.EventSource.CLOSED = OriginalEventSource.CLOSED;

  var originalFetch = window.fetch;
  window.fetch = function(url, options) {
    var urlStr = typeof url === 'string' ? url : (url.url || url.toString());
    var isChatApi = urlStr.indexOf('/api/assistant/chat') !== -1;

    if (isChatApi) {
      activeStreams++;
      showLoading();
      return originalFetch.call(this, url, options).then(function(response) {
        hideLoading();
        return response;
      }).catch(function(err) {
        activeStreams--;
        if (activeStreams <= 0) {
          activeStreams = 0;
          hideLoading();
        }
        throw err;
      });
    }

    return originalFetch.call(this, url, options);
  };
})();
</script>
</body>
</html>
